# CodeRabbit Configuration for volumeleaders-rs
# Docs: https://docs.coderabbit.ai/configuration/
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: Prefer concise responses (high information density, low fluff)

reviews:
  profile: assertive
  collapse_walkthrough: false
  poem: false
  request_changes_workflow: true
  high_level_summary: false
  high_level_summary_placeholder: "@coderabbitai summary"
  abort_on_close: true
  review_status: true
  suggested_labels: false
  suggested_reviewers: false
  in_progress_fortune: false

  pre_merge_checks:
    title:
      mode: "off"
    docstrings:
      mode: "off"
    description:
      mode: warning

  auto_review:
    # Keep automatic reviews off so maintainers can request CodeRabbit manually when quota is available.
    enabled: false
    drafts: false
    auto_pause_after_reviewed_commits: 0
    base_branches:
      - main
    ignore_title_keywords:
      - "WIP"
      - "[WIP]"
      - "DO NOT MERGE"

  path_filters:
    - "!**/target/**"
    - "!.sisyphus/**"
    - "!lcov.info"

  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        Rust CLI and library review:
        - This single crate exposes both the `volumeleaders-agent` JSON CLI and a library API for VolumeLeaders browser-session data.
        - Preserve the default `cli` feature and the library-only `default-features = false` build.
        - Preserve exact VolumeLeaders wire contracts, form field names, cookie names, and DataTables bracketed encoding.
        - Currency fields use rust_decimal::Decimal; ratios and indicators stay f64.
        - Never expose cookie values, auth cookies, or XSRF tokens in logs, errors, tests, docs, Debug, or Display output.
        - stdout is machine-readable output only; diagnostics and logs belong on stderr.
        - Dashboard output should be token-efficient with compact fields unless `--all-fields` is requested.
        - Dashboard transforms (type collapsing, venue, events, sentinel omission, rounding) apply universally before field filtering.
        - Keep compact JSON defaults stable unless tests and README examples are updated.
        - Ensure new commands wire clap, command dispatch, tests, and README notes together.
        - Prefer focused API-boundary feedback over broad architecture rewrites.
        - Don't nitpick style because rustfmt and clippy handle formatting and lint.

    - path: "**/*.{rs,toml,yml,yaml}"
      instructions: |
        Rust crate review:
        - Keep publishable crate metadata valid for crates.io.
        - The `cli` feature must remain additive; library-only builds with `--no-default-features` must stay clean.
        - Release automation should preserve release-plz for crates.io publishing and cargo-dist for CLI artifacts.

    - path: ".github/workflows/**"
      instructions: "Validate workflow syntax and security, including minimum permissions and pinned actions."

    - path: "Makefile"
      instructions: |
        Makefile validation:
        - .PHONY declarations for all non-file targets.
        - Check targets should run cargo fmt, clippy, tests, and docs.
        - Avoid flags that are already defaults unless the flag documents an important supported build shape.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: global
  code_guidelines:
    enabled: true
    filePatterns:
      - "guidelines.md"
      - "**/AGENTS.md"
